<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
  <title>Propiedad en venta</title>
  <link rel="stylesheet" href="style.css?v=3">
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css">
  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
  <style>
    body { background: #F7F8FA; }
    .prop { max-width: 860px; margin: 0 auto; padding: 0 18px 90px; }
    .hero { border-radius: 0 0 18px 18px; overflow: hidden; margin: 0 -18px; background: #000; }
    .hero video, .hero img { width: 100%; display: block; max-height: 62dvh; object-fit: cover; }
    .head { padding: 22px 2px 6px; }
    .head h1 { font-size: 26px; font-weight: 750; letter-spacing: -0.3px; color: #17202B; }
    .head .loc { color: #5A6B80; font-size: 14px; margin-top: 4px; display: flex; align-items: center; gap: 6px; }
    .price { font-family: var(--mono); font-size: 24px; font-weight: 700; color: #1E7FD1; margin-top: 10px; }
    .specs { display: flex; gap: 10px; flex-wrap: wrap; margin: 18px 0; }
    .spec { background: #fff; border: 1px solid #E3E8EF; border-radius: 10px; padding: 10px 16px; text-align: center; flex: 1; min-width: 90px; }
    .spec b { display: block; font-family: var(--mono); font-size: 17px; color: #17202B; }
    .spec span { font-size: 10.5px; letter-spacing: 0.8px; text-transform: uppercase; color: #8794A6; }
    .desc { background: #fff; border: 1px solid #E3E8EF; border-radius: 14px; padding: 20px 22px; font-size: 14.5px; line-height: 1.65; color: #2A3646; white-space: pre-line; }
    .sec-t { font-size: 12px; letter-spacing: 1.2px; text-transform: uppercase; color: #8794A6; font-weight: 700; margin: 26px 2px 10px; }
    #pmap { height: 320px; border-radius: 14px; overflow: hidden; border: 1px solid #E3E8EF; }
    .gal { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 8px; }
    .gal img { width: 100%; aspect-ratio: 16/10; object-fit: cover; border-radius: 8px; cursor: pointer; }
    .cta {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 40;
      background: rgba(247, 248, 250, 0.92); backdrop-filter: blur(10px);
      border-top: 1px solid #E3E8EF; padding: 12px 18px calc(12px + env(safe-area-inset-bottom));
      display: flex; gap: 10px; justify-content: center;
    }
    .cta a { flex: 1; max-width: 300px; text-align: center; padding: 13px; border-radius: 12px; font-weight: 650; font-size: 15px; }
    .cta .wa { background: #1E8F63; color: #fff; }
    .cta .call { background: #fff; border: 1px solid #E3E8EF; color: #17202B; }
    .brandline { text-align: center; color: #A6B1C0; font-size: 11px; padding: 26px 0 8px; }
  </style>
</head>
<body>
  <div class="prop" id="root"><p style="padding:40px;color:#8794A6">Cargando propiedad…</p></div>
  <script>
    (async () => {
      const slug = new URLSearchParams(location.search).get('id');
      const r = await fetch(`data/properties/${slug}.json`);
      if (!r.ok) { document.getElementById('root').innerHTML = '<p style="padding:40px">Propiedad no encontrada.</p>'; return; }
      const p = await r.json();
      document.title = `${p.titulo} — en venta`;
      const video = p.video ? (p.video.endsWith('.mp4') ? `data/reels/${p.video}` : `data/proxies/${p.video}.mp4`) : null;
      const poster = p.clip ? `data/thumbs/${p.clip}.jpg` : '';
      const frames = p.clip ? Array.from({ length: Math.min(p.gallery_n || 8, 12) }, (_, i) =>
        `data/frames/${p.clip}/f_${String(i * 3 + 2).padStart(4, '0')}.jpg`) : [];
      document.getElementById('root').innerHTML = `
        <div class="hero">${video
          ? `<video src="${video}" controls playsinline webkit-playsinline preload="metadata" ${poster ? `poster="${poster}"` : ''} autoplay muted loop></video>`
          : `<img src="${poster}" alt="">`}</div>
        <div class="head">
          <h1>${p.titulo || 'Propiedad en venta'}</h1>
          <div class="loc">${p.ubicacion || ''}</div>
          ${p.precio ? `<div class="price">${p.precio}</div>` : ''}
        </div>
        <div class="specs">
          ${p.area ? `<div class="spec"><b>${p.area}</b><span>m²</span></div>` : ''}
          ${p.habitaciones ? `<div class="spec"><b>${p.habitaciones}</b><span>habitaciones</span></div>` : ''}
          ${p.banos ? `<div class="spec"><b>${p.banos}</b><span>baños</span></div>` : ''}
          ${p.parqueaderos ? `<div class="spec"><b>${p.parqueaderos}</b><span>parqueaderos</span></div>` : ''}
          ${p.estrato ? `<div class="spec"><b>${p.estrato}</b><span>estrato</span></div>` : ''}
        </div>
        ${p.descripcion ? `<div class="desc">${p.descripcion}</div>` : ''}
        ${p.lat && p.lon ? `<div class="sec-t">Ubicación</div><div id="pmap"></div>` : ''}
        ${frames.length ? `<div class="sec-t">Vistas aéreas</div><div class="gal">
          ${frames.map(f => `<img src="${f}" loading="lazy" alt="" onclick="window.open('${f}')">`).join('')}</div>` : ''}
        <div class="brandline">Recorrido aéreo real capturado con dron · metislab.work</div>
        <div class="cta">
          ${p.whatsapp ? `<a class="wa" href="https://wa.me/${p.whatsapp.replace(/\D/g, '')}?text=${encodeURIComponent('Hola, me interesa: ' + p.titulo)}">WhatsApp</a>` : ''}
          ${p.telefono ? `<a class="call" href="tel:${p.telefono}">Llamar</a>` : ''}
        </div>`;
      if (p.lat && p.lon) {
        const map = new maplibregl.Map({
          container: 'pmap', center: [p.lon, p.lat], zoom: 16.5,
          style: { version: 8, sources: { sat: { type: 'raster', tiles: ['https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'], tileSize: 256, attribution: 'Esri' } }, layers: [{ id: 'sat', type: 'raster', source: 'sat' }] },
          attributionControl: { compact: true },
        });
        new maplibregl.Marker({ color: '#1E7FD1' }).setLngLat([p.lon, p.lat]).addTo(map);
      }
    })();
  </script>
</body>
</html>
