name: AeroBrain external uptime

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: aerobrain-uptime
  cancel-in-progress: true

jobs:
  public-probe:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Probe health, page and video Range
        run: python3 pipeline/external_probe.py
